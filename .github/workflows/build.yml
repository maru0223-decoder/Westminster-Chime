name: Build EXE

on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with: {python-version: '3.10'}
      - name: Install dependencies
        run: pip install customtkinter pillow pygame plyer pyinstaller
      - name: Build EXE
        run: pyinstaller --noconsole --onefile --name "jam_gui" jam_gui.py
      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: Westminster-Setup
          path: dist/